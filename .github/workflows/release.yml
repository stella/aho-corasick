name: Release

env:
  NODE_VERSION: "22"
  BUN_VERSION: "1.3.12"
  CDXGEN_VERSION: "12.1.5"
  CARGO_INCREMENTAL: 0

on:
  push:
    branches: [main]
    paths: [VERSION]
  workflow_dispatch:
    inputs:
      publish_to_npm:
        description: Publish the current VERSION to npm after verification
        required: true
        default: false
        type: boolean

concurrency:
  group: release-${{ github.repository }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  release-ref:
    name: Release ref
    if: >-
      github.event_name == 'workflow_dispatch'
      && inputs.publish_to_npm
      && github.ref != 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - run: |
          echo "::error::Manual npm publishing must run from main."
          exit 1

  preflight:
    name: Preflight
    if: >-
      github.event_name != 'workflow_dispatch'
      || inputs.publish_to_npm != true
      || github.ref == 'refs/heads/main'
    uses: stella/.github/.github/workflows/npm-version-preflight.yml@1cf2d8c99d478e37c653dbe25816bfe5b26157ce
    with:
      package-files: |
        package.json
        wasm/package.json
        npm/darwin-arm64/package.json
        npm/darwin-x64/package.json
        npm/linux-arm64-gnu/package.json
        npm/linux-x64-gnu/package.json
        npm/wasm32-wasi/package.json
      dependency-name-prefixes: |
        @stll/aho-corasick-
      publish-to-npm: >-
        ${{ github.event_name == 'push'
            || (inputs.publish_to_npm && github.ref == 'refs/heads/main') }}

  verify:
    name: Verify
    needs: preflight
    if: needs.preflight.outputs.already-released != 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
      - run: node scripts/version-sync.mjs check
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          toolchain: stable
          components: clippy, rustfmt
          targets: wasm32-wasip1-threads
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: release-verify
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - run: bun install --frozen-lockfile
      - run: bun run lint
      - run: cargo clippy --all-targets --all-features -- -Dwarnings
      - run: cargo fmt --all -- --check
      - run: cargo test --all-targets --all-features
      - name: License audit
        run: |
          cargo install cargo-deny --locked
          cargo deny check
      - name: Docs
        run: cargo doc --no-deps
        env:
          RUSTDOCFLAGS: -Dwarnings
      - uses: stella/.github/actions/provenance-check@6c88c6f9ea4beaa132caec7c60f65b1b9b32a74a
        with:
          provenance-version: v0.1.3
      - run: bun run build
      - run: bun run build:js
      - run: bun test
      - run: bun run test:props
      - run: bun run test:runtime:bun
      - run: bun run test:runtime:node

  build:
    name: Build - ${{ matrix.settings.target }}
    needs: [preflight, verify]
    if: needs.preflight.outputs.already-released != 'true'
    runs-on: ${{ matrix.settings.os }}
    strategy:
      fail-fast: false
      matrix:
        settings:
          - target: x86_64-apple-darwin
            os: macos-15
          - target: aarch64-apple-darwin
            os: macos-15
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            use-cross: true
          - target: x86_64-pc-windows-msvc
            os: windows-latest
          - target: wasm32-wasip1-threads
            os: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        with:
          toolchain: stable
          targets: ${{ matrix.settings.target }}
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          shared-key: release-build-${{ matrix.settings.target }}
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - run: bun install --frozen-lockfile
      - name: Build native
        if: >-
          !matrix.settings.use-cross
          && matrix.settings.target != 'wasm32-wasip1-threads'
        run: bun run build --target ${{ matrix.settings.target }}
      - name: Build cross-compile
        if: ${{ matrix.settings.use-cross }}
        run: >
          bun run build
          --target ${{ matrix.settings.target }}
          --use-napi-cross
      - name: Build WASM
        if: matrix.settings.target == 'wasm32-wasip1-threads'
        run: bun run build:wasm
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: bindings-${{ matrix.settings.target }}
          path: |
            *.node
            *.wasm
            !*.debug.wasm
            *.cjs
            *.wasi-browser.js
            wasi-worker*.mjs
          if-no-files-found: error

  test:
    name: Test (${{ matrix.os }})
    needs: [preflight, build]
    if: needs.preflight.outputs.already-released != 'true'
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-15, windows-latest]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - run: bun install --frozen-lockfile
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts
      - name: Move artifacts
        shell: bash
        run: |
          set -euo pipefail
          ls -R artifacts/
          for dir in artifacts/bindings-*; do
            cp -- "$dir"/*.node . 2>/dev/null || true
            cp -- "$dir"/*.wasm . 2>/dev/null || true
            cp -- "$dir"/*.cjs . 2>/dev/null || true
            cp -- "$dir"/*.wasi-browser.js . 2>/dev/null || true
            cp -- "$dir"/wasi-worker*.mjs . 2>/dev/null || true
          done
          ls -la -- *.node 2>/dev/null || echo "No .node files"
          ls -la -- *.wasm 2>/dev/null || echo "No .wasm files"
      - run: bun test
      - name: Property tests
        if: matrix.os == 'ubuntu-latest'
        run: bun run test:props

  pack:
    name: Pack
    needs: [preflight, verify, test]
    if: needs.preflight.outputs.already-released != 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      attestations: write
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: ${{ env.NODE_VERSION }}
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: ${{ env.BUN_VERSION }}
      - run: bun install --frozen-lockfile
      - run: npm install --global "@cyclonedx/cdxgen@${{ env.CDXGEN_VERSION }}"
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts
      - name: Prepare npm packages
        run: bun x @napi-rs/cli artifacts
      - name: Move artifacts
        shell: bash
        run: |
          set -euo pipefail
          ls -R artifacts/
          for dir in artifacts/bindings-*; do
            cp -- "$dir"/*.node . 2>/dev/null || true
            cp -- "$dir"/*.wasm . 2>/dev/null || true
            cp -- "$dir"/*.cjs . 2>/dev/null || true
            cp -- "$dir"/*.wasi-browser.js . 2>/dev/null || true
            cp -- "$dir"/wasi-worker*.mjs . 2>/dev/null || true
          done
      - run: bun run build:js
      - run: node scripts/prepare-release-package.mjs
      - name: Pack release tarballs
        id: pack
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-artifacts

          root_json="$(npm pack --json --ignore-scripts --pack-destination release-artifacts)"
          root_file="$(echo "$root_json" | jq -r '.[0].filename')"
          root_tarball="release-artifacts/$root_file"

          while IFS= read -r pkg; do
            (
              cd "$pkg"
              npm pack --json --ignore-scripts --pack-destination "$GITHUB_WORKSPACE/release-artifacts" >/dev/null
            )
          done < <(find npm -mindepth 1 -maxdepth 1 -type d | sort)

          (
            cd wasm
            npm pack --json --ignore-scripts --pack-destination "$GITHUB_WORKSPACE/release-artifacts" >/dev/null
          )

          mapfile -t aux_tarballs < <(find release-artifacts -maxdepth 1 -name '*.tgz' ! -name "$root_file" | sort)
          node scripts/check-release-tarballs.mjs "$root_tarball" "${aux_tarballs[@]}"

          echo "root_tarball=$root_tarball" >> "$GITHUB_OUTPUT"
          {
            echo 'aux_tarballs<<EOF'
            printf '%s\n' "${aux_tarballs[@]}"
            echo EOF
          } >> "$GITHUB_OUTPUT"
      - name: Generate release checksums
        run: |
          set -euo pipefail
          (
            cd release-artifacts
            sha256sum -- ./*.tgz > SHA256SUMS
          )
      - name: Generate attestation SBOM
        run: >
          cdxgen
          --spec-version 1.6
          --required-only
          --exclude-regex '(^|/)node_modules(/.*)?$'
          --output release-artifacts/attest-sbom.cdx.json
          .
      - name: Attest root package tarball with SBOM
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26
        with:
          subject-path: ${{ steps.pack.outputs.root_tarball }}
          sbom-path: release-artifacts/attest-sbom.cdx.json
      - name: Attest auxiliary package tarballs
        if: steps.pack.outputs.aux_tarballs != ''
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26
        with:
          subject-path: ${{ steps.pack.outputs.aux_tarballs }}
      - name: Stage provenance release assets
        run: |
          set -euo pipefail
          cp provenance/sbom.cdx.json release-artifacts/provenance-sbom.cdx.json
          cp provenance/THIRD-PARTY-NOTICES.txt release-artifacts/provenance-THIRD-PARTY-NOTICES.txt
          cp provenance/report.json release-artifacts/provenance-report.json
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-artifacts
          path: release-artifacts
          if-no-files-found: error

  finalize:
    name: Finalize
    needs: [preflight, pack]
    if: >-
      needs.preflight.outputs.already-released != 'true'
      && (github.event_name == 'push'
          || (inputs.publish_to_npm && github.ref == 'refs/heads/main'))
    uses: stella/.github/.github/workflows/npm-version-finalize.yml@1cf2d8c99d478e37c653dbe25816bfe5b26157ce
    with:
      package-files: |
        package.json
        wasm/package.json
        npm/darwin-arm64/package.json
        npm/darwin-x64/package.json
        npm/linux-arm64-gnu/package.json
        npm/linux-x64-gnu/package.json
        npm/wasm32-wasi/package.json
      publish-to-npm: >-
        ${{ github.event_name == 'push'
            || (inputs.publish_to_npm && github.ref == 'refs/heads/main') }}
    permissions:
      contents: write
      id-token: write
      pull-requests: write
    secrets: inherit
